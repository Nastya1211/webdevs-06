<section class="feedbacks" id="feedbacks">
  <div class="feedbacks-container container">
    <div class="feedbacks-header">
      <svg class="feedbacks-icon" aria-hidden="true">
      </svg>
      <h2 class="feedbacks-title">Words from Our Wonderful Couples</h2>
      <p class="feedbacks-description">
        Read what the couples who entrusted us with their most precious memories
        have to say.
      </p>
    </div>

    <div class="feedbacks-slider swiper">
      <ul class="feedbacks-list swiper-wrapper"></ul>
    </div>

    <div class="feedbacks-controls">
      <div class="feedbacks-pagination swiper-pagination"></div>

      <div class="feedbacks-navigation">
        <button
          class="feedbacks-button feedbacks-button-prev"
          type="button"
          aria-label="Previous feedback"
        >
        </button>
        <button
          class="feedbacks-button feedbacks-button-next"
          type="button"
          aria-label="Next feedback"
        >
        </button>
      </div>
    </div>
  </div>
</section>
